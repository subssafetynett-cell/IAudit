version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: iaudit-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: iaudit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: iaudit-server
    restart: always
    depends_on:
      - db
    env_file:
      - ./server/.env
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/iaudit?schema=public
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3001
    container_name: iaudit-frontend
    restart: always
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  postgres_data:
