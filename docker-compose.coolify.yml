version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-iaudit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - 5432

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-iaudit}?schema=public
      PORT: 3001
      # Other variables (STRIPE_SECRET_KEY, etc.) should be added in Coolify dashboard
    expose:
      - 3001

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    depends_on:
      - backend
    expose:
      - 80

volumes:
  postgres_data:
