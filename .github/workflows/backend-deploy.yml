name: Backend CI/CD to EC2 (Direct SSH)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
    - name: SSH into EC2 and Deploy
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Navigate to project directory
          # Note: Assuming project is in ~/iauditApp - adjust if necessary
          cd ~/iauditApp || cd /var/www/iauditApp
          
          # Pull latest code
          git pull origin main
          
          # Install dependencies and generate prisma client
          cd server
          npm install
          npx prisma generate
          
          # Restart server (assuming PM2 is used)
          # If not using PM2, you might use 'npm run start &' or similar
          pm2 restart all || (pkill node && npm run start &)
